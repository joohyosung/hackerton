name: Data Pipeline

on:
  workflow_dispatch:
    inputs:
      commit_dataset:
        description: Commit generated data files back to the current branch
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: write

jobs:
  refresh-loan-products:
    runs-on: ubuntu-latest
    env:
      DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
      LOAN_API_ENDPOINT: https://apis.data.go.kr/B553701/LoanProductSearchingInfo
      LOAN_API_PATH: /LoanProductSearchingInfo/getLoanProductSearchingInfo
      LOAN_API_PAGE_SIZE: "100"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate sample data contract
        run: |
          python scripts/loan_data_pipeline.py \
            --sample \
            --strict \
            --output target/data/sample-loan-products.json \
            --manifest-output target/data/sample-loan-products.manifest.json

      - name: Fetch and validate live public data
        if: env.DATA_GO_KR_SERVICE_KEY != ''
        run: |
          python scripts/loan_data_pipeline.py \
            --strict \
            --output data/loan-products.json \
            --manifest-output data/loan-products.manifest.json

      - name: Skip live fetch when API key is not configured
        if: env.DATA_GO_KR_SERVICE_KEY == ''
        run: |
          echo "DATA_GO_KR_SERVICE_KEY secret is not configured. Sample contract validation completed."

      - name: Upload generated data
        uses: actions/upload-artifact@v4
        with:
          name: loan-products-data
          path: |
            target/data/
            data/
          if-no-files-found: warn

      - name: Commit generated data
        if: github.event_name == 'workflow_dispatch' && inputs.commit_dataset == 'true' && env.DATA_GO_KR_SERVICE_KEY != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/loan-products.json data/loan-products.manifest.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update loan product data"
            git push
          fi
