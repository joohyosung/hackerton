name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-data-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Build and test
        run: mvn -B test

      - name: Validate sample data contract
        run: |
          python scripts/loan_data_pipeline.py \
            --sample \
            --strict \
            --output target/data/loan-products.json \
            --manifest-output target/data/loan-products.manifest.json

      - name: Upload normalized sample data
        uses: actions/upload-artifact@v4
        with:
          name: sample-loan-products
          path: target/data/
