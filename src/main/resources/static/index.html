<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>대출알리오</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="search-panel" aria-labelledby="search-title">
            <div class="brand-line">
                <a class="brand" href="/" aria-label="대출알리오 홈">
                    <img src="/assets/brand-mark.svg" alt="" class="brand-mark">
                    <span>대출알리오</span>
                </a>
                <span class="status-pill">공공 서민대출</span>
            </div>

            <div class="panel-head">
                <p class="eyebrow">맞춤 조건</p>
                <h1 id="search-title">대출 조건 검색</h1>
            </div>

            <form id="loan-form" class="loan-form">
                <div class="form-section form-section-primary">
                    <div class="section-label">기본 조건</div>

                    <label>
                        <span>나이</span>
                        <input id="age" name="age" type="number" min="19" max="100" value="32" required>
                    </label>

                    <label>
                        <span>연소득</span>
                        <div class="with-unit">
                            <input id="annualIncome" name="annualIncome" type="number" min="0" value="3200" required>
                            <em>만원</em>
                        </div>
                    </label>

                    <label>
                        <span>희망 대출금액</span>
                        <div class="with-unit">
                            <input id="loanAmount" name="loanAmount" type="number" min="0" value="1000" required>
                            <em>만원</em>
                        </div>
                    </label>

                    <label>
                        <span>거주 지역</span>
                        <select id="region" name="region" required>
                            <option value="전국" selected>전국</option>
                            <option value="서울">서울</option>
                            <option value="경기">경기</option>
                            <option value="인천">인천</option>
                            <option value="강원">강원</option>
                            <option value="충북">충북</option>
                            <option value="충남">충남</option>
                            <option value="전북">전북</option>
                            <option value="전남">전남</option>
                            <option value="경북">경북</option>
                            <option value="경남">경남</option>
                            <option value="부산">부산</option>
                            <option value="대구">대구</option>
                            <option value="광주">광주</option>
                            <option value="대전">대전</option>
                            <option value="울산">울산</option>
                            <option value="세종">세종</option>
                            <option value="제주">제주</option>
                        </select>
                    </label>

                    <label>
                        <span>대출 용도</span>
                        <select id="purpose" name="purpose" required>
                            <option value="생계" selected>생계</option>
                            <option value="대환">대환</option>
                            <option value="주거">주거</option>
                            <option value="창업">창업</option>
                            <option value="운영">운영</option>
                            <option value="의료">의료</option>
                            <option value="학자금">학자금</option>
                        </select>
                    </label>
                </div>

                <details class="advanced-options">
                    <summary>상세 조건 입력</summary>

                    <div class="advanced-grid">
                        <label>
                            <span>신용등급</span>
                            <select id="creditGrade" name="creditGrade">
                                <option value="">모름/선택 안 함</option>
                                <option value="1">1등급</option>
                                <option value="2">2등급</option>
                                <option value="3">3등급</option>
                                <option value="4">4등급</option>
                                <option value="5">5등급</option>
                                <option value="6">6등급</option>
                                <option value="7">7등급</option>
                                <option value="8">8등급</option>
                                <option value="9">9등급</option>
                                <option value="10">무등급/기타</option>
                            </select>
                        </label>

                        <label>
                            <span>나에게 가까운 대상</span>
                            <select id="userType" name="userType">
                                <option value="">선택 안 함</option>
                                <option value="근로자">근로자</option>
                                <option value="사업자">사업자</option>
                                <option value="청년">청년</option>
                                <option value="대학생">대학생</option>
                                <option value="소상공인">소상공인</option>
                                <option value="금융취약계층">금융취약계층</option>
                                <option value="저소득">저소득</option>
                                <option value="채무조정자">채무조정자</option>
                                <option value="중소기업">중소기업</option>
                                <option value="무주택자">무주택자</option>
                            </select>
                        </label>
                    </div>
                </details>

                <button type="submit" class="primary-action">
                    <span class="button-icon" aria-hidden="true">⌕</span>
                    <span>검색</span>
                </button>
            </form>
        </section>

        <section id="result-section" class="result-section" aria-labelledby="result-title" hidden>
            <div class="result-head">
                <div>
                    <p class="eyebrow">검색 결과</p>
                    <h2 id="result-title">조건에 맞는 대출 정보</h2>
                </div>
                <output id="result-count" class="result-count">0개</output>
            </div>

            <div id="message" class="message" role="status"></div>
            <div id="results" class="results" aria-live="polite"></div>
            <div class="calculation-notice">
                <h5>추천 기준 안내</h5>
                <p>추천 점수는 공공데이터 API의 한도, 용도, 대상, 지역, 연령, 소득, 신용 조건을 기준으로 계산됩니다.</p>
                <p>실제 대출 가능 여부와 한도는 금융기관의 심사 결과에 따라 달라질 수 있습니다.</p>
            </div>
            <nav id="pagination" class="pagination" aria-label="검색 결과 페이지"></nav>
        </section>
    </main>

    <div id="product-modal" class="modal-overlay" hidden>
        <section class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title" tabindex="-1">
            <div class="modal-head">
                <div>
                    <p class="eyebrow">상품 상세</p>
                    <h2 id="modal-title"></h2>
                </div>
                <button id="modal-close" class="icon-button" type="button" aria-label="닫기">×</button>
            </div>

            <div id="modal-summary" class="modal-summary"></div>
            <dl id="modal-details" class="detail-list"></dl>
            <div id="modal-reasons" class="detail-notes"></div>
        </section>
    </div>

    <script src="/app.js"></script>
</body>
</html>
