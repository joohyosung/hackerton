server.port=8080
spring.application.name=daechul-alio

loan.api.endpoint=${LOAN_API_ENDPOINT:https://apis.data.go.kr/B553701/LoanProductSearchingInfo}
loan.api.path=${LOAN_API_PATH:/LoanProductSearchingInfo/getLoanProductSearchingInfo}
loan.api.service-key=${DATA_GO_KR_SERVICE_KEY:}
loan.api.page-size=${LOAN_API_PAGE_SIZE:100}
loan.api.use-sample-when-unavailable=true

loan.policy.dsr-limit=${LOAN_POLICY_DSR_LIMIT:40}
loan.policy.dti-limit=${LOAN_POLICY_DTI_LIMIT:40}
loan.policy.ltv-limit=${LOAN_POLICY_LTV_LIMIT:70}
loan.policy.first-home-buyer-ltv-limit=${LOAN_POLICY_FIRST_HOME_BUYER_LTV_LIMIT:80}
loan.policy.stress-rate-addition=${LOAN_POLICY_STRESS_RATE_ADDITION:0}
loan.policy.minimum-recommendation-score=${LOAN_POLICY_MINIMUM_RECOMMENDATION_SCORE:35}